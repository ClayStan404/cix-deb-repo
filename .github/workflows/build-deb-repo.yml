name: Build APT Repository

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.find-projects.outputs.projects }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find projects with debian packaging
        id: find-projects
        run: |
          projects=$(find . -mindepth 2 -maxdepth 4 -type d -name "debian" | sed 's|./||' | sed 's|/debian||' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "projects=$projects" >> $GITHUB_OUTPUT
          echo "Found projects: $projects"

  build:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.discover.outputs.projects) }}
    container:
      image: debian:sid
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y build-essential devscripts debhelper dpkg-dev pbuilder

      - name: Build package for ${{ matrix.project }}
        run: |
          cd "${{ matrix.project }}"
          if [ ! -f debian/control ]; then
            echo "No debian/control found, skipping"
            exit 0
          fi
          mk-build-deps --install --tool='apt-get --no-install-recommends -y' || true
          dpkg-buildpackage -b -uc -us || dpkg-buildpackage -uc -us
          cd ..
          mkdir -p artifacts
          mv *.deb artifacts/ 2>/dev/null || true

      - name: Upload debs
        uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.project }}
          path: artifacts/*.deb
          if-no-files-found: ignore

  create-repo:
    needs: [discover, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all debs
        uses: actions/download-artifact@v4
        with:
          pattern: debs-*
          path: debs
          merge-multiple: true

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y reprepro gnupg

      - name: Configure reprepro (unsigned mode)
        run: |
          mkdir -p repo/conf
          cat > repo/conf/distributions << 'EOF'
          Origin: Cix Repository
          Label: Cix Debian Repository
          Suite: stable
          Codename: debian13
          Architectures: amd64 arm64 source
          Components: main
          Description: APT repository for Cix packages
          EOF

      - name: Add packages to repository
        run: |
          for deb in debs/*.deb; do
            if [ -f "$deb" ]; then
              echo "Adding $deb"
              reprepro -b repo includedeb debian13 "$deb"
            fi
          done

      - name: Sign repository (optional)
        if: vars.ENABLE_GPG == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        continue-on-error: true
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "pinentry-mode loopback" > ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          echo "$GPG_PRIVATE_KEY" | gpg --batch --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --import
          KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep sec | head -1 | awk '{print $2}' | cut -d'/' -f2)
          echo "SignWith: $KEY_ID" >> repo/conf/distributions
          # 重新签名 Release 文件
          reprepro -b repo export
          gpg --armor --export "$KEY_ID" > repo/repository-key.asc

      - name: Create README
        run: |
          cat > repo/README.md <<'EOF'
          # Cix APT Repository

          ## Setup

          ### Without verification (current mode):
          ```bash
          echo "deb [trusted=yes] https://claystan404.github.io/cix-deb-repo debian13 main" | sudo tee /etc/apt/sources.list.d/cix.list
          sudo apt update
          ```

          ### Install packages:
          ```bash
          sudo apt install <package-name>
          ```
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: repo

  deploy:
    needs: create-repo
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

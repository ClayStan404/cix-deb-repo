name: Build APT Repository

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.find-projects.outputs.projects }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find projects with debian packaging
        id: find-projects
        run: |
          projects=$(find . -mindepth 2 -maxdepth 4 -type d -name "debian" | sed 's|./||' | sed 's|/debian||' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "projects=$projects" >> $GITHUB_OUTPUT
          echo "Found projects: $projects"

  build:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.discover.outputs.projects) }}
    container:
      image: debian:sid
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y build-essential devscripts debhelper dpkg-dev pbuilder

      - name: Build package for ${{ matrix.project }}
        run: |
          cd "${{ matrix.project }}"
          if [ ! -f debian/control ]; then
            echo "No debian/control found, skipping"
            exit 0
          fi
          mk-build-deps --install --tool='apt-get --no-install-recommends -y' || true
          dpkg-buildpackage -b -uc -us || dpkg-buildpackage -uc -us
          cd ..
          mkdir -p artifacts
          mv *.deb artifacts/ 2>/dev/null || true

      - name: Upload debs
        uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.project }}
          path: artifacts/*.deb
          if-no-files-found: ignore

  create-repo:
    needs: [discover, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all debs
        uses: actions/download-artifact@v4
        with:
          pattern: debs-*
          path: debs
          merge-multiple: true

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y reprepro gnupg

      - name: Configure reprepro (unsigned mode)
        run: |
          mkdir -p repo/conf
          cat > repo/conf/distributions << 'EOF'
          Origin: Cix Repository
          Label: Debian Trixie CIX Packages Repo
          Suite: stable
          Codename: trixie
          Architectures: arm64 amd64
          Components: main
          Description: APT repository for Cix packages
          EOF
          cat repo/conf/distributions

      - name: List downloaded packages
        run: |
          echo "=== Downloaded .deb files ==="
          ls -la debs/
          echo ""
          echo "=== Package info ==="
          for deb in debs/*.deb; do
            if [ -f "$deb" ]; then
              dpkg-deb -I "$deb" | grep -E "Architecture|Package"
            fi
          done

      - name: Add packages to repository
        run: |
          for deb in debs/*.deb; do
            if [ -f "$deb" ]; then
              echo "=== Adding $deb ==="
              reprepro -b repo --verbose includedeb trixie "$deb"
            fi
          done

      - name: Verify repository structure
        run: |
          echo "=== Repository structure ==="
          find repo -type f | head -20
          echo ""
          echo "=== Pool contents ==="
          ls -la repo/pool/ 2>/dev/null || echo "pool dir not found"
          echo ""
          echo "=== Dists contents ==="
          ls -la repo/dists/ 2>/dev/null || echo "dists dir not found"

      - name: Sign repository (optional)
        if: vars.ENABLE_GPG == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        continue-on-error: true
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "pinentry-mode loopback" > ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          echo "$GPG_PRIVATE_KEY" | gpg --batch --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --import
          KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep sec | head -1 | awk '{print $2}' | cut -d'/' -f2)
          echo "SignWith: $KEY_ID" >> repo/conf/distributions
          # 重新签名 Release 文件
          reprepro -b repo export
          gpg --armor --export "$KEY_ID" > repo/repository-key.asc

      - name: Create README
        run: |
          cat > repo/README.md <<'EOF'
          # Cix APT Repository

          ## Setup

          ### Without verification (current mode):
          ```bash
          echo "deb [trusted=yes] https://claystan404.github.io/cix-deb-repo trixie main" | sudo tee /etc/apt/sources.list.d/cix.list
          sudo apt update
          ```

          ### Install packages:
          ```bash
          sudo apt install <package-name>
          ```
          EOF

      - name: Create directory indexes
        run: |
          # 为每个目录创建 index.html 以启用目录浏览
          cd repo

          # 生成目录索引的函数
          generate_index() {
            local dir="$1"
            local title="$2"
            mkdir -p "$dir"
            {
              echo "<!DOCTYPE html>"
              echo "<html><head><title>$title</title>"
              echo "<style>body{font-family:sans-serif;max-width:800px;margin:40px auto;padding:20px}"
              echo "a{color:#0366d6;text-decoration:none}"
              echo "a:hover{text-decoration:underline}"
              echo "table{width:100%;border-collapse:collapse}"
              echo "th,tr:nth-child(even){background:#f6f8fa}"
              echo "th,td{padding:8px;text-align:left}"
              echo "</style></head><body>"
              echo "<h1>$title</h1>"
              echo "<table><tr><th>Name</th><th>Last modified</th><th>Size</th></tr>"
              echo "<tr><td><a href=\"../\">../</a></td><td>-</td><td>-</td></tr>"

              # 列出文件和目录
              for item in "$dir"/*; do
                [ -e "$item" ] || continue
                name=$(basename "$item")
                if [ -d "$item" ]; then
                  size="-"
                  mod=$(stat -c "%y" "$item" 2>/dev/null | cut -d'.' -f1 || echo "-")
                  echo "<tr><td><a href=\"$name/\">$name/</a></td><td>$mod</td><td>$size</td></tr>"
                elif [ -f "$item" ]; then
                  size=$(stat -c "%s" "$item" 2>/dev/null | numfmt --to=iec 2>/dev/null || echo "-")
                  mod=$(stat -c "%y" "$item" 2>/dev/null | cut -d'.' -f1 || echo "-")
                  echo "<tr><td><a href=\"$name\">$name</a></td><td>$mod</td><td>$size</td></tr>"
                fi
              done
              echo "</table></body></html>"
            } > "$dir/index.html"
          }

          # 为主要目录生成索引
          generate_index "pool" "Pool - Package Files"
          find pool -type d -exec sh -c 'generate_index "$1" "Index: $1"' _ {} \;

          generate_index "pool/main" "Pool - Main"
          find pool/main -type d -exec sh -c 'generate_index "$1" "Index: $1"' _ {} \;

          generate_index "dists" "Distributions"
          generate_index "dists/trixie" "Distribution: trixie"
          generate_index "dists/trixie/main" "Component: main"
          generate_index "dists/trixie/main/binary-amd64" "Binary AMD64"
          generate_index "dists/trixie/main/binary-arm64" "Binary ARM64"

          echo "Generated index files:"
          find repo -name "index.html" | head -20

      - name: Create index.html
        run: |
          cat > repo/index.html <<'HTMLDOC'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Cix APT Repository</title>
            <style>
              body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.6; }
              h1 { color: #333; border-bottom: 2px solid #0366d6; padding-bottom: 10px; }
              pre { background: #f6f8fa; padding: 16px; border-radius: 6px; overflow-x: auto; }
              a { color: #0366d6; text-decoration: none; }
              a:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
            <h1>Cix APT Repository</h1>
            <p>Debian package repository hosted on GitHub Pages.</p>
            <h2>Quick Setup</h2>
            <pre>echo "deb [trusted=yes] https://claystan404.github.io/cix-deb-repo trixie main" | sudo tee /etc/apt/sources.list.d/cix.list
          sudo apt update</pre>
            <h2>Install Packages</h2>
            <pre>sudo apt install package-name</pre>
            <h2>Available Packages</h2>
            <ul>
              <li><a href="dists/">dists/</a> - Package indices</li>
              <li><a href="pool/">pool/</a> - Package files</li>
            </ul>
            <p><a href="README.md">View README</a></p>
          </body>
          </html>
          HTMLDOC

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: repo

  deploy:
    needs: create-repo
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

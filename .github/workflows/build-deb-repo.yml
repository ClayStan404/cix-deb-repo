name: Build APT Repository

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.find-projects.outputs.projects }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find projects with debian packaging
        id: find-projects
        run: |
          projects=$(find . -mindepth 2 -maxdepth 4 -type d -name "debian" | sed 's|./||' | sed 's|/debian||' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "projects=$projects" >> $GITHUB_OUTPUT
          echo "Found projects: $projects"

  build:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.discover.outputs.projects) }}
    container:
      image: debian:sid
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y build-essential devscripts debhelper dpkg-dev pbuilder

      - name: Build package for ${{ matrix.project }}
        run: |
          cd "${{ matrix.project }}"
          if [ ! -f debian/control ]; then
            echo "No debian/control found, skipping"
            exit 0
          fi
          mk-build-deps --install --tool='apt-get --no-install-recommends -y' || true
          dpkg-buildpackage -b -uc -us || dpkg-buildpackage -uc -us
          cd ..
          mkdir -p artifacts
          mv *.deb artifacts/ 2>/dev/null || true

      - name: Upload debs
        uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.project }}
          path: artifacts/*.deb
          if-no-files-found: ignore

  create-repo:
    needs: [discover, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all debs
        uses: actions/download-artifact@v4
        with:
          pattern: debs-*
          path: debs
          merge-multiple: true

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y reprepro gnupg

      - name: Setup GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            mkdir -p ~/.gnupg
            chmod 700 ~/.gnupg
            echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
            echo "$GPG_PRIVATE_KEY" | gpg --batch --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --import
            KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep -E 'sec|ssb' | head -1 | awk '{print $2}' | cut -d'/' -f2)
            echo "KEY_ID=$KEY_ID" >> $GITHUB_ENV
            echo "HAS_GPG=true" >> $GITHUB_ENV
            echo "Using GPG key: $KEY_ID"
          else
            echo "HAS_GPG=false" >> $GITHUB_ENV
            echo "No GPG key found, creating unsigned repository"
          fi

      - name: Configure reprepro
        run: |
          mkdir -p repo/conf
          if [ "$HAS_GPG" = "true" ]; then
            SIGN_WITH="SignWith: $KEY_ID"
          else
            SIGN_WITH="SignWith: no"
          fi
          {
            echo "Origin: Cix Repository"
            echo "Label: Cix Debian Repository"
            echo "Suite: stable"
            echo "Codename: debian13"
            echo "Architectures: amd64 arm64 source"
            echo "Components: main"
            echo "Description: APT repository for Cix packages"
            echo "$SIGN_WITH"
          } > repo/conf/distributions
          cat repo/conf/distributions

      - name: Add packages to repository
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          for deb in debs/*.deb; do
            if [ -f "$deb" ]; then
              echo "Adding $deb to repository"
              if [ "$HAS_GPG" = "true" ]; then
                reprepro -b repo --nothingworkserror includedeb debian13 "$deb" || reprepro -b repo includedeb debian13 "$deb"
              else
                reprepro -b repo includedeb debian13 "$deb"
              fi
            fi
          done

      - name: Export GPG public key
        run: |
          if [ "$HAS_GPG" = "true" ] && [ -n "$KEY_ID" ]; then
            gpg --armor --export "$KEY_ID" > repo/repository-key.asc
            echo "GPG public key exported"
          fi

      - name: Create APT repo info page
        run: |
          cat > repo/README.md <<'EOF'
          # Cix APT Repository

          ## 添加仓库到你的系统

          ### 使用 GPG 签名验证（推荐）

          ```bash
          wget -qO- https://<username>.github.io/<repo>/repository-key.asc | gpg --dearmor | sudo tee /usr/share/keyrings/cix-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cix-archive-keyring.gpg] https://<username>.github.io/<repo> debian13 main" | sudo tee /etc/apt/sources.list.d/cix.list
          ```

          ### 不验证签名（仅用于测试）

          ```bash
          echo "deb [trusted=yes] https://<username>.github.io/<repo> debian13 main" | sudo tee /etc/apt/sources.list.d/cix.list
          ```

          ### 安装包

          ```bash
          sudo apt update
          sudo apt install <package-name>
          ```
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: repo

  deploy:
    needs: create-repo
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

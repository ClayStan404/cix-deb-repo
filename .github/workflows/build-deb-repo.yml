name: Build APT Repository

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.find-projects.outputs.projects }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find projects with debian packaging
        id: find-projects
        run: |
          projects=$(find . -mindepth 2 -maxdepth 4 -type d -name "debian" | sed 's|./||' | sed 's|/debian||' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "projects=$projects" >> $GITHUB_OUTPUT
          echo "Found projects: $projects"

  build:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.discover.outputs.projects) }}
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential devscripts debhelper dpkg-dev crossbuild-essential-arm64 gcc-aarch64-linux-gnu g++-aarch64-linux-gnu qemu-user-static

      - name: Build package ${{ matrix.project }}
        run: |
          cd "${{ matrix.project }}"
          if [ ! -f debian/control ]; then
            echo "No debian/control found, skipping"
            exit 0
          fi

          # 检查包架构
          PACKAGE_ARCH=$(grep "^Package:" debian/control | head -1 | awk '{print $2}')
          ARCH_LINE=$(grep -E "^Architecture:" debian/control | head -1)
          echo "Package: $PACKAGE_ARCH, Arch line: $ARCH_LINE"

          # 设置 arm64 交叉编译环境
          export DEB_BUILD_OPTIONS=arch=arm64
          export DEB_HOST_ARCH=arm64
          export DEB_HOST_GNU_TYPE=aarch64-linux-gnu
          export DEB_BUILD_GNU_TYPE=x86_64-linux-gnu
          export CC=aarch64-linux-gnu-gcc
          export CXX=aarch64-linux-gnu-g++

          # 安装构建依赖
          sudo mk-build-deps --install --arch=arm64 --tool='apt-get --no-install-recommends -y' || \
          sudo apt-get build-dep -a arm64 -y . || \
          sudo mk-build-deps --install --tool='apt-get --no-install-recommends -y' || true

          # 构建 arm64 包
          echo "Building for arm64..."
          dpkg-buildpackage -a arm64 -b -uc -us --host-arch aarch64-linux-gnu || \
          dpkg-buildpackage -a arm64 -b -uc -us || {
            echo "Build failed, trying binary-arch only..."
            debian/rules binary-arch
          }

          cd ..
          mkdir -p artifacts
          mv *.deb artifacts/ 2>/dev/null || true

      - name: Upload debs
        uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.project }}
          path: artifacts/*.deb
          if-no-files-found: ignore

  create-repo:
    needs: [discover, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all debs
        uses: actions/download-artifact@v4
        with:
          pattern: debs-*
          path: debs
          merge-multiple: true

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y reprepro gnupg

      - name: Configure reprepro (unsigned mode)
        run: |
          mkdir -p repo/conf
          cat > repo/conf/distributions << 'EOF'
          Origin: Cix Repository
          Label: Debian Trixie arm64 CIX Packages Repo
          Suite: stable
          Codename: trixie
          Architectures: arm64
          Components: main
          Description: APT repository for Cix packages
          EOF
          cat repo/conf/distributions

      - name: List downloaded packages
        run: |
          echo "=== Downloaded .deb files ==="
          ls -la debs/ || echo "No debs found"
          echo ""
          echo "=== Package info ==="
          for deb in debs/*.deb; do
            if [ -f "$deb" ]; then
              dpkg-deb -I "$deb" | grep -E "Architecture|Package" || true
            fi
          done

      - name: Add packages to repository
        run: |
          for deb in debs/*.deb; do
            if [ -f "$deb" ]; then
              echo "=== Adding $deb ==="
              reprepro -b repo --verbose includedeb trixie "$deb"
            fi
          done

      - name: Verify repository structure
        run: |
          echo "=== Repository structure ==="
          find repo -type f | head -20
          echo ""
          echo "=== Pool contents ==="
          ls -laR repo/pool/ 2>/dev/null || echo "pool dir not found"
          echo ""
          echo "=== Dists contents ==="
          ls -laR repo/dists/ 2>/dev/null || echo "dists dir not found"

      - name: Sign repository (optional)
        if: vars.ENABLE_GPG == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        continue-on-error: true
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "pinentry-mode loopback" > ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          echo "$GPG_PRIVATE_KEY" | gpg --batch --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --import
          KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep sec | head -1 | awk '{print $2}' | cut -d'/' -f2)
          echo "SignWith: $KEY_ID" >> repo/conf/distributions
          reprepro -b repo export
          gpg --armor --export "$KEY_ID" > repo/repository-key.asc

      - name: Create README
        run: |
          cat > repo/README.md <<'EOF'
          # Cix APT Repository

          ## Setup

          ### Without verification (current mode):
          ```bash
          echo "deb [trusted=yes] https://claystan404.github.io/cix-deb-repo trixie main" | sudo tee /etc/apt/sources.list.d/cix.list
          sudo apt update
          ```

          ### Install packages:
          ```bash
          sudo apt install <package-name>
          ```
          EOF

      - name: Create directory indexes
        run: |
          cd repo
          generate_index() {
            local dir="$1"
            local title="$2"
            local rel_dir="${dir#repo/}"
            [ -z "$rel_dir" ] && rel_dir="."
            mkdir -p "$dir"
            {
              echo "<!DOCTYPE html>"
              echo "<html><head><title>$rel_dir</title>"
              echo "<style>body{font-family:sans-serif;max-width:800px;margin:40px auto;padding:20px}"
              echo "a{color:#0366d6;text-decoration:none}"
              echo "a:hover{text-decoration:underline}"
              echo "table{width:100%;border-collapse:collapse}"
              echo "th,tr:nth-child(even){background:#f6f8fa}"
              echo "th,td{padding:8px;text-align:left}"
              echo "</style></head><body>"
              echo "<h1>Index of /$rel_dir</h1>"
              echo "<table><tr><th>Name</th><th>Last modified</th><th>Size</th></tr>"
              echo "<tr><td><a href=\"../\">../</a></td><td>-</td><td>-</td></tr>"
              for item in "$dir"/*; do
                [ -e "$item" ] || continue
                name=$(basename "$item")
                [ "$name" = "index.html" ] && continue
                if [ -d "$item" ]; then
                  size="-"
                  mod_time=$(stat -c "%y" "$item" 2>/dev/null | cut -d'.' -f1 || echo "-")
                  echo "<tr><td><a href=\"$name/\">$name/</a></td><td>$mod_time</td><td>$size</td></tr>"
                elif [ -f "$item" ]; then
                  size=$(stat -c "%s" "$item" 2>/dev/null | numfmt --to=iec-i --suffix=B 2>/dev/null || echo "-")
                  mod_time=$(stat -c "%y" "$item" 2>/dev/null | cut -d'.' -f1 || echo "-")
                  echo "<tr><td><a href=\"$name\">$name</a></td><td>$mod_time</td><td>$size</td></tr>"
                fi
              done
              echo "</table></body></html>"
            } > "$dir/index.html"
          }
          echo "=== Finding all directories ==="
          find repo -type d | sort
          echo ""
          echo "=== Generating index files ==="
          find repo -type d | while read dir; do
            echo "Generating: $dir/index.html"
            generate_index "$dir" "Index: $dir"
          done
          echo ""
          echo "=== Verification ==="
          echo "Generated index.html files:"
          find repo -name "index.html" | sort
          echo ""
          echo "Total: $(find repo -name "index.html" | wc -l) index files"
          echo ""
          echo "=== Checking specific directories ==="
          ls -la repo/dists/index.html 2>/dev/null || echo "  dists/index.html NOT FOUND"
          ls -la repo/dists/trixie/index.html 2>/dev/null || echo "  dists/trixie/index.html NOT FOUND"

      - name: Create index.html
        run: |
          cat > repo/index.html <<'HTMLDOC'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Cix APT Repository</title>
            <style>
              body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.6; }
              h1 { color: #333; border-bottom: 2px solid #0366d6; padding-bottom: 10px; }
              pre { background: #f6f8fa; padding: 16px; border-radius: 6px; overflow-x: auto; }
              a { color: #0366d6; text-decoration: none; }
              a:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
            <h1>Cix APT Repository</h1>
            <p>Debian Trixie ARM64 package repository hosted on GitHub Pages.</p>
            <h2>Quick Setup</h2>
            <pre>echo "deb [trusted=yes] https://claystan404.github.io/cix-deb-repo trixie main" | sudo tee /etc/apt/sources.list.d/cix.list
          sudo apt update</pre>
            <h2>Install Packages</h2>
            <pre>sudo apt install package-name</pre>
            <p><strong>Architecture:</strong> ARM64 only</p>
            <h2>Available Packages</h2>
            <ul>
              <li><a href="dists/">dists/</a> - Package indices</li>
              <li><a href="pool/">pool/</a> - Package files</li>
            </ul>
            <p><a href="README.md">View README</a></p>
          </body>
          </html>
          HTMLDOC

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: repo

  deploy:
    needs: create-repo
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

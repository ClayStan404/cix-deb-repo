name: Build APT Repository

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.find-projects.outputs.projects }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find projects with debian packaging
        id: find-projects
        run: |
          projects=$(find . -mindepth 2 -maxdepth 4 -type d -name "debian" | sed 's|./||' | sed 's|/debian||' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "projects=$projects" >> $GITHUB_OUTPUT
          echo "Found projects: $projects"

  build:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.discover.outputs.projects) }}
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential devscripts debhelper dpkg-dev crossbuild-essential-arm64 gcc-aarch64-linux-gnu g++-aarch64-linux-gnu qemu-user-static

      - name: Build package ${{ matrix.project }}
        run: |
          cd "${{ matrix.project }}"
          if [ ! -f debian/control ]; then
            echo "No debian/control found, skipping"
            exit 0
          fi

          # 设置 arm64 交叉编译环境
          export DEB_BUILD_OPTIONS=arch=arm64
          export DEB_HOST_ARCH=arm64
          export DEB_HOST_GNU_TYPE=aarch64-linux-gnu
          export DEB_BUILD_GNU_TYPE=x86_64-linux-gnu
          export CC=aarch64-linux-gnu-gcc
          export CXX=aarch64-linux-gnu-g++

          # 安装构建依赖
          sudo mk-build-deps --install --arch=arm64 --tool='apt-get --no-install-recommends -y' || \
          sudo apt-get build-dep -a arm64 -y . || \
          sudo mk-build-deps --install --tool='apt-get --no-install-recommends -y' || true

          # 构建 arm64 包
          echo "Building for arm64..."
          dpkg-buildpackage -a arm64 -b -uc -us --host-arch aarch64-linux-gnu || \
          dpkg-buildpackage -a arm64 -b -uc -us || {
            echo "Build failed, trying binary-arch only..."
            debian/rules binary-arch
          }

          cd ..
          mkdir -p artifacts
          mv *.deb artifacts/ 2>/dev/null || true

      - name: Upload debs
        uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.project }}
          path: artifacts/*.deb
          if-no-files-found: ignore

  create-repo:
    needs: [discover, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all debs
        uses: actions/download-artifact@v4
        with:
          pattern: debs-*
          path: debs
          merge-multiple: true

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y reprepro gnupg

      - name: Setup GPG for signing
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg

          # 配置 GPG 和 gpg-agent
          cat > ~/.gnupg/gpg.conf << 'GPGCONF'
          use-agent
          pinentry-mode loopback
          GPGCONF

          cat > ~/.gnupg/gpg-agent.conf << 'AGENTCONF'
          allow-loopback-pinentry
          default-cache-ttl 7200
          max-cache-ttl 7200
          AGENTCONF

          # 导入私钥
          echo "$GPG_PRIVATE_KEY" | gpg --batch --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --import

          KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep sec | head -1 | awk '{print $2}' | cut -d'/' -f2)
          echo "Using key: $KEY_ID"
          echo "GPG_KEY_ID=$KEY_ID" >> $GITHUB_ENV

          # 预载密码到 gpg-agent - 使用环境变量方式
          gpgconf --kill gpg-agent 2>/dev/null || true

          # 方法：通过 GPG_TTY 和环境变量传递密码
          GPG_TTY=$(tty)
          export GPG_TTY

          # 方案：使用 echo 和管道传递密码给 gpg2
          # 首先执行一次签名让 gpg-agent 认识密码
          {
            echo "$GPG_PASSPHRASE" | gpg --batch --pinentry-mode loopback --passphrase-fd 0 --status-fd 1 --sign --local-user "$KEY_ID" >/dev/null
          } || {
            echo "Failed to cache passphrase in gpg-agent"
          }

          # 重新启动 gpg-agent
          gpg-agent --daemon --batch 2>/dev/null || true

          echo "✓ GPG setup complete""

      - name: Configure reprepro
        run: |
          mkdir -p repo/conf
          cat > repo/conf/distributions << 'EOF'
          Origin: Cix Repository
          Label: Debian Trixie arm64 CIX Packages Repo
          Suite: stable
          Codename: trixie
          Architectures: arm64
          Components: main
          Description: APT repository for Cix packages
          SignWith: ${{ env.GPG_KEY_ID }}
          EOF
          cat repo/conf/distributions

      - name: Add packages to repository
        run: |
          for deb in debs/*.deb; do
            if [ -f "$deb" ]; then
              echo "=== Adding $deb ==="
              reprepro -b repo --ask-passphrase includedeb trixie "$deb"
            fi
          done

      - name: Export and verify
        run: |
          reprepro -b repo export
          gpg --verify repo/dists/trixie/Release.gpg repo/dists/trixie/Release 2>/dev/null && echo "✓ Signature verified" || echo "Warning: Signature verification failed"

      - name: Export GPG public key
        run: |
          gpg --armor --export "$GPG_KEY_ID" > repo/cix-deb-repo.asc
          echo "Public key exported"

      - name: Create README
        run: |
          cat > repo/README.md <<'EOF'
          # Cix APT Repository

          ## Setup

          ### Import GPG key:
          ```bash
          wget -qO- https://claystan404.github.io/cix-deb-repo/cix-deb-repo.asc | gpg --dearmor | sudo tee /usr/share/keyrings/cix-archive-keyring.gpg
          ```

          ### Add repository:
          ```bash
          echo "deb [signed-by=/usr/share/keyrings/cix-archive-keyring.gpg] https://claystan404.github.io/cix-deb-repo trixie main" | sudo tee /etc/apt/sources.list.d/cix.list
          ```

          ### Install packages:
          ```bash
          sudo apt update
          sudo apt install <package-name>
          ```
          EOF

      - name: Create directory indexes
        run: |
          cd repo
          for dir in $(find . -type d | sort); do
            rel_dir="${dir#./}"
            [ -z "$rel_dir" ] && rel_dir="."
            {
              echo '<!DOCTYPE html>'
              echo '<html><head><title>'"Index of /$rel_dir"'</title>'
              echo '<style>body{font-family:sans-serif;max-width:800px;margin:40px auto;padding:20px}'
              echo 'a{color:#0366d6;text-decoration:none}'
              echo 'a:hover{text-decoration:underline}'
              echo 'table{width:100%;border-collapse:collapse}'
              echo 'th,tr:nth-child(even){background:#f6f8fa}'
              echo 'th,td{padding:8px;text-align:left}'
              echo '</style></head><body>'
              echo '<h1>Index of /'"$rel_dir"'</h1>'
              echo '<table><tr><th>Name</th><th>Last modified</th><th>Size</th></tr>'
              echo '<tr><td><a href="../">../</a></td><td>-</td><td>-</td></tr>'
              for item in "$dir"/*; do
                [ -e "$item" ] || continue
                name=$(basename "$item")
                [ "$name" = "index.html" ] && continue
                if [ -d "$item" ]; then
                  echo '<tr><td><a href="'"$name"'/">'"$name"'/</a></td><td>-</td><td>-</td></tr>'
                elif [ -f "$item" ]; then
                  size=$(stat -c "%s" "$item" 2>/dev/null | numfmt --to=iec 2>/dev/null || echo "-")
                  echo '<tr><td><a href="'"$name"'">'"$name"'</a></td><td>-</td><td>'"$size"'</td></tr>'
                fi
              done
              echo '</table></body></html>'
            } > "$dir/index.html"
          done
          echo "Generated $(find . -name 'index.html' | wc -l) index files"

      - name: Create index.html
        run: |
          cat > repo/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Cix APT Repository</title>
            <style>
              body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.6; }
              h1 { color: #333; border-bottom: 2px solid #0366d6; padding-bottom: 10px; }
              pre { background: #f6f8fa; padding: 16px; border-radius: 6px; overflow-x: auto; white-space: pre-wrap; word-wrap: break-word; }
              a { color: #0366d6; text-decoration: none; }
              a:hover { text-decoration: underline; }
              .verified { color: #22863a; font-weight: bold; }
            </style>
          </head>
          <body>
            <h1>Cix APT Repository</h1>
            <p>Debian Trixie ARM64 package repository hosted on GitHub Pages.</p>
            <p><span class="verified">✓ Signed Repository</span> - All packages are cryptographically signed.</p>
            <h2>Quick Setup</h2>
            <pre>wget -qO- https://claystan404.github.io/cix-deb-repo/cix-deb-repo.asc | gpg --dearmor | sudo tee /usr/share/keyrings/cix-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cix-archive-keyring.gpg] https://claystan404.github.io/cix-deb-repo trixie main" | sudo tee /etc/apt/sources.list.d/cix.list
          sudo apt update
          sudo apt install package-name</pre>
            <p><strong>Architecture:</strong> ARM64 only</p>
            <h2>Available Packages</h2>
            <ul>
              <li><a href="dists/">dists/</a> - Package indices</li>
              <li><a href="pool/">pool/</a> - Package files</li>
              <li><a href="cix-deb-repo.asc">cix-deb-repo.asc</a> - GPG public key</li>
            </ul>
            <p><a href="README.md">View README</a></p>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: repo

  deploy:
    needs: create-repo
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

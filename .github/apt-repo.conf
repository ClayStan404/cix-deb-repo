# APT 仓库配置文件
# 这些设置会被 GitHub workflow 使用

[repository]
# 仓库名称
name = "Cix Repository"

# 仓库描述
description = "Debian Trixie CIX Packages Repo"

# 发行版代号
codename = "trixie"

# Suite 名称
suite = "stable"

# 支持的架构
architectures = ["arm64", "amd64", "source"]

# 组件
components = ["main"]

[packages]
# 要构建的项目列表（留空则自动发现所有包含 debian/ 的目录）
# 例如：projects = ["example-package", "another-package"]
projects = []
